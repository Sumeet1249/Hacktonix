version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: blindspot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blindspot}
      POSTGRES_USER: ${POSTGRES_USER:-blindspot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blindspot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blindspot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker) ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: blindspot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage) ───────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: blindspot_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # MinIO Console (browser UI)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blindspot_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-blindspot}:${POSTGRES_PASSWORD:-blindspot}@postgres:5432/${POSTGRES_DB:-blindspot}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-blindspot}
      WEIGHTS_DIR: /app/weights
      GENERATED_DIR: /app/generated
      MOCK_ML: ${MOCK_ML:-true}
      IMAGES_PER_STRESSOR: ${IMAGES_PER_STRESSOR:-8}
    volumes:
      - weights_data:/app/weights
      - generated_data:/app/generated
      - ./backend:/app   # hot-reload in dev
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: blindspot_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-blindspot}:${POSTGRES_PASSWORD:-blindspot}@postgres:5432/${POSTGRES_DB:-blindspot}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-blindspot}
      WEIGHTS_DIR: /app/weights
      GENERATED_DIR: /app/generated
      MOCK_ML: ${MOCK_ML:-true}
      IMAGES_PER_STRESSOR: ${IMAGES_PER_STRESSOR:-8}
    volumes:
      - weights_data:/app/weights
      - generated_data:/app/generated
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        # Remove the above 'devices' block if no GPU available

  # ── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blindspot_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}

volumes:
  postgres_data:
  minio_data:
  weights_data:
  generated_data:

networks:
  default:
    name: blindspot_network
